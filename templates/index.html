<!DOCTYPE html>
<html lang="en">

<head>
    <!-- page title shown in browser tab -->
    <title>EventHub</title>

    <!-- bootstrap css framework -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<!-- light background for clean look -->
<body class="bg-light">

    <!-- main content container -->
    <div class="container mt-5">

        <!-- website heading section -->
        <header class="text-center mb-4">
            <h1>EventHub</h1>
            <p>Find local meetups, workshops and events around Perth</p>
        </header>

        <!-- event preview card -->
        <section class="card p-4 shadow-sm">

            <h2>Upcoming Event</h2>

            <h3>Tech Night Meetup</h3>

            <!-- short event description -->
            <p>
                Join developers, designers and startup founders
                for networking and discussion.
            </p>

            <!-- event date, time and location -->
            <p>
                Date: 12 Apr <br>
                Time: 6:00 PM <br>
                Location: Perth CBD
            </p>

            <!-- navigation button to event detail page -->
            <a href="event_detail.html" class="btn btn-dark">
                View Details
            </a>

        </section>

    </div>

</body>
</html>
