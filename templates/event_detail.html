<!DOCTYPE html>
<html lang="en">

<head>
    <!-- page title shown in browser tab -->
    <title>Event Details</title>

    <!-- bootstrap css framework for styling -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<!-- light grey page background -->
<body class="bg-light">

    <!-- main content container -->
    <div class="container mt-5">

        <!-- event details card -->
        <section class="card p-4 shadow-sm">

            <!-- event title -->
            <h1>Tech Night Meetup</h1>

            <!-- short event description -->
            <p>
                Join developers, designers and startup founders
                for an evening of networking and discussion.
            </p>

            <!-- event information -->
            <p>
                <strong>Date:</strong> 12 Apr <br>
                <strong>Time:</strong> 6:00 PM <br>
                <strong>Location:</strong> Perth CBD <br>
                <strong>Seats Left:</strong> 20
            </p>

            <!-- interaction buttons -->
            <div class="mt-3">

                <!-- like button -->
                <button class="btn btn-outline-danger" onclick="increaseLike()">
                    ❤️ Like
                </button>

                <!-- like count display -->
                <span id="likeCount" class="ms-2">0</span>

                <!-- join event button -->
                <button class="btn btn-primary">
                    Join Event
                </button>
            </div>

            <!-- payment details section -->
            <div class="mt-4">
                <h4>Payment Details</h4>
                <p>PayID: 0400 123 456</p>
            </div>

            <!-- back navigation button -->
            <a href="index.html" class="btn btn-dark mt-3">
                Back to Home
            </a>

        </section>

    </div>

    <!-- javascript for like button interaction -->
    <script>
        let likes = 0;

        function increaseLike() {
            likes = likes + 1;

            document.getElementById("likeCount").innerText = likes;
        }
    </script>

</body>
</html>
